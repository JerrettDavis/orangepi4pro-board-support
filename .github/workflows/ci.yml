name: CI

on:
  push:
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install shellcheck and build deps
        run: sudo apt-get update && sudo apt-get install -y shellcheck gcc libusb-1.0-0-dev libx11-dev libxtst-dev

      - name: Run repository checks
        run: scripts/ci-checks.sh

